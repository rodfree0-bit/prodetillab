<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MyCarwash App – Business Card</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&display=swap"
    rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    /* ── Reset ─────────────────────────────────────────── */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    /* ── Screen layout ──────────────────────────────────── */
    body {
      background: #1a1f2e;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 48px;
      padding: 60px 20px;
      font-family: 'Poppins', sans-serif;
    }

    .page-title {
      color: rgba(255, 255, 255, 0.4);
      font-size: 11px;
      letter-spacing: 4px;
      text-transform: uppercase;
    }

    .cards-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 40px;
    }

    /* ── Card base — exact 3.5×2 in at 96 dpi = 336×192 px, scaled ×2.5 ── */
    .card {
      width: 756px;
      /* 3.5in × 96 × 2.25 */
      height: 432px;
      /* 2in  × 96 × 2.25  */
      border-radius: 24px;
      overflow: hidden;
      position: relative;
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.7), 0 0 0 1px rgba(255, 255, 255, 0.06);
    }

    /* ════════════════════════════════════
       FRONT CARD
    ════════════════════════════════════ */
    .card-front {
      background: radial-gradient(ellipse 80% 90% at 50% 40%, #0e2a4a 0%, #0a1628 45%, #060d1a 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 22px;
    }

    /* Subtle grid overlay */
    .card-front::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(0, 170, 255, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 170, 255, 0.03) 1px, transparent 1px);
      background-size: 32px 32px;
      pointer-events: none;
    }

    /* Center glow behind logo */
    .front-glow {
      position: absolute;
      width: 340px;
      height: 340px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(0, 170, 255, 0.18) 0%, transparent 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -55%);
      pointer-events: none;
    }

    .front-logo {
      position: relative;
      z-index: 2;
      width: 190px;
      height: 190px;
      border-radius: 32px;
      overflow: hidden;
      /* cyan glow ring matching reference */
      filter: drop-shadow(0 0 18px rgba(0, 200, 255, 0.55)) drop-shadow(0 0 40px rgba(0, 160, 255, 0.3));
    }

    .front-logo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .front-name {
      position: relative;
      z-index: 2;
      font-size: 34px;
      font-weight: 800;
      line-height: 1;
      letter-spacing: -0.5px;
      /* "MyCarwash" white, "App" cyan */
    }

    .front-name .white {
      color: #ffffff;
    }

    .front-name .cyan {
      color: #22d3f5;
    }

    /* ════════════════════════════════════
       BACK CARD
    ════════════════════════════════════ */
    .card-back {
      background: radial-gradient(ellipse 100% 120% at 50% -10%, #0d2040 0%, #07111f 50%, #050e1a 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
      padding: 36px 52px 28px;
    }

    .card-back::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(0, 170, 255, 0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 170, 255, 0.025) 1px, transparent 1px);
      background-size: 32px 32px;
      pointer-events: none;
    }

    /* Headline */
    .back-headline {
      position: relative;
      z-index: 2;
      text-align: center;
      margin-bottom: 6px;
    }

    .back-headline .line1 {
      font-size: 28px;
      font-weight: 800;
      color: #ffffff;
      line-height: 1.1;
    }

    .back-headline .line2 {
      font-size: 28px;
      font-weight: 800;
      color: #22d3f5;
      line-height: 1.2;
    }

    .back-sub {
      position: relative;
      z-index: 2;
      font-size: 12.5px;
      color: rgba(255, 255, 255, 0.5);
      font-weight: 400;
      letter-spacing: 0.3px;
      margin-bottom: 14px;
      text-align: center;
    }

    /* Download button pill */
    .download-btn {
      position: relative;
      z-index: 2;
      border: 1.5px solid rgba(0, 200, 255, 0.55);
      border-radius: 30px;
      padding: 5px 20px;
      font-size: 12px;
      font-weight: 600;
      color: #22d3f5;
      letter-spacing: 0.3px;
      margin-bottom: 10px;
      background: transparent;
    }

    /* QR code */
    .qr-wrap {
      position: relative;
      z-index: 2;
      background: white;
      border-radius: 10px;
      padding: 8px;
      margin-bottom: 12px;
      box-shadow: 0 0 0 2px rgba(0, 200, 255, 0.35), 0 0 20px rgba(0, 160, 255, 0.2);
    }

    #qrcode canvas,
    #qrcode img {
      display: block;
      width: 90px !important;
      height: 90px !important;
    }

    /* Store badges */
    .store-badges {
      position: relative;
      z-index: 2;
      display: flex;
      gap: 12px;
      align-items: center;
      margin-bottom: 10px;
    }

    .store-badges img {
      height: 36px;
      width: auto;
      display: block;
      border-radius: 6px;
    }

    /* Footer stats */
    .back-footer {
      position: relative;
      z-index: 2;
      font-size: 11px;
      color: rgba(255, 255, 255, 0.35);
      letter-spacing: 1px;
    }

    .back-footer span {
      color: rgba(255, 255, 255, 0.55);
    }

    /* ── Controls ─────────────────────────────────── */
    .controls {
      display: flex;
      gap: 12px;
    }

    .btn {
      padding: 11px 28px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      background: rgba(255, 255, 255, 0.05);
      color: rgba(255, 255, 255, 0.7);
      font-family: 'Poppins', sans-serif;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.5px;
      transition: all 0.2s;
    }

    .btn:hover {
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
    }

    .btn-print {
      border-color: rgba(34, 211, 245, 0.4);
      color: #22d3f5;
      background: rgba(34, 211, 245, 0.07);
    }

    .btn-print:hover {
      background: rgba(34, 211, 245, 0.15);
    }

    /* ── Print styles ────────────────────────────────── */
    @media print {
      @page {
        size: 3.5in 2in;
        margin: 0;
      }

      body {
        background: white;
        padding: 0;
        gap: 0;
        display: block;
      }

      .page-title,
      .controls {
        display: none !important;
      }

      .cards-wrapper {
        gap: 0;
      }

      .card {
        width: 3.5in;
        height: 2in;
        border-radius: 0;
        box-shadow: none;
        page-break-after: always;
        break-after: page;
        print-color-adjust: exact;
        -webkit-print-color-adjust: exact;
      }

      .card-front {
        page-break-after: always;
      }
    }
  </style>
</head>

<body>

  <p class="page-title">MyCarwash App · Business Card · Print Ready</p>

  <div class="cards-wrapper">

    <!-- ▶ FRONT ─────────────────────────── -->
    <div class="card card-front">
      <div class="front-glow"></div>
      <div class="front-logo">
        <img src="../public/logo.png" alt="MyCarwash App Logo" />
      </div>
      <div class="front-name">
        <span class="white">MyCarwash&nbsp;</span><span class="cyan">App</span>
      </div>
    </div>

    <!-- ▶ BACK ──────────────────────────── -->
    <div class="card card-back">

      <div class="back-headline">
        <div class="line1">Premium Car Wash</div>
        <div class="line2">&amp; Detailing in Los Angeles</div>
      </div>

      <p class="back-sub">Professional mobile car wash — We come to you, anywhere in L.A.</p>

      <div class="download-btn">Download the App to Book!</div>

      <div class="qr-wrap">
        <div id="qrcode"></div>
      </div>

      <div class="store-badges">
        <img src="https://developer.apple.com/app-store/marketing/guidelines/images/badge-download-on-the-app-store.svg"
          alt="Download on the App Store" />
        <img src="https://play.google.com/intl/en_us/badges/static/images/badges/en_badge_web_generic.png"
          alt="Get it on Google Play" style="height:52px; margin-top:-8px;" />
      </div>

      <div class="back-footer">
        <span>24/7 Booking Available</span> &nbsp;|&nbsp; <span>4.9★ Average Rating</span>
      </div>

    </div>

  </div><!-- /.cards-wrapper -->

  <div class="controls">
    <button class="btn" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑ Preview</button>
    <button class="btn btn-print" onclick="window.print()">🖨 Print Both Cards</button>
  </div>

  <script>
    new QRCode(document.getElementById("qrcode"), {
      text: "https://prodetaillab.com",
      width: 90,
      height: 90,
      colorDark: "#000000",
      colorLight: "#ffffff",
      correctLevel: QRCode.CorrectLevel.H
    });
  </script>

</body>

</html>
